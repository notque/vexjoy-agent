name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff pyyaml
      # INDEX.json is generated (untracked); build it before validators read it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: ruff check . --config pyproject.toml
      - run: ruff format --check . --config pyproject.toml
      - run: python scripts/validate-references.py --check-do-framing
      - run: python scripts/validate-skill-frontmatter.py
      - run: python scripts/validate-index-integrity.py
      - run: python scripts/validate-doc-links.py
      - run: python scripts/validate-doc-counts.py
      - run: python scripts/validate-doc-commands.py
      - run: python scripts/validate_component_models.py
      # Conformance gate for native .js workflows: declared meta.contract vs actual
      # dispatch. node is not installed in CI, so the STATIC validator is the gate
      # and the dynamic .mjs harness pass auto-skips (local/dev tool). See
      # adr/native-fast-path-portable-floor.md Stages 0-1.
      - run: python scripts/validate-workflow-conformance.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pyyaml pillow numpy jsonschema
      # INDEX.json is generated (untracked); tests that read the real index need it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: python -m pytest --tb=short -q

  routing-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # INDEX.json is generated (untracked); the benchmark reads it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: python scripts/routing-benchmark.py --verbose

  routing-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # INDEX.json is generated (untracked); the drift check reads it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: python scripts/check-routing-drift.py --verbose

  joy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pytest
      - name: Joy-check golden fixtures and fleet scan (agents + SKILL.md)
        run: python -m pytest scripts/tests/test_joy_check_instruction_mode.py -v --tb=short

  hook-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # Static checks (dormancy, schema, mirror, allowlist) read the repo
      # directly. Liveness (smoke-test) + register-hook validate read
      # ~/.claude, so deploy hooks + settings.json there first.
      - name: Deploy hooks and settings to ~/.claude
        run: |
          mkdir -p "$HOME/.claude/hooks/lib"
          cp hooks/*.py "$HOME/.claude/hooks/"
          cp hooks/lib/*.py "$HOME/.claude/hooks/lib/" 2>/dev/null || true
          cp .claude/settings.json "$HOME/.claude/settings.json"
      - name: Registered hooks resolve to backing files
        run: python scripts/register-hook.py validate
      - name: Hook-health gate (no-dormant, schema, mirror, liveness)
        run: python scripts/validate-hook-health.py --ci
      - name: Smoke-test all registered hooks
        run: python scripts/smoke-test-hooks.py --ci
