name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff pyyaml
      # INDEX.json is generated (untracked); build it before validators read it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: ruff check . --config pyproject.toml
      - run: ruff format --check . --config pyproject.toml
      - run: python scripts/validate-references.py --check-do-framing
      # Scoped flag: --all carries known pre-existing failures, so it cannot gate CI.
      - run: python scripts/validate-references.py --check-placeholders
      - run: python scripts/validate-skill-frontmatter.py
      - run: python scripts/validate-index-integrity.py
      - run: python scripts/validate-doc-links.py
      - run: python scripts/validate-doc-counts.py
      - run: python scripts/validate-doc-commands.py
      - run: python scripts/validate_component_models.py
      # Conformance gate for native .js workflows: declared meta.contract vs actual
      # dispatch. node is not installed in CI, so the STATIC validator is the gate
      # and the dynamic .mjs harness pass auto-skips (local/dev tool). See
      # adr/native-fast-path-portable-floor.md Stages 0-1.
      - run: python scripts/validate-workflow-conformance.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pyyaml pillow numpy jsonschema
      # INDEX.json is generated (untracked); tests that read the real index need it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: python -m pytest --tb=short -q

  routing-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # INDEX.json is generated (untracked); the benchmark reads it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: python scripts/routing-benchmark.py --verbose

  routing-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # INDEX.json is generated (untracked); the drift check reads it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: python scripts/check-routing-drift.py --verbose

  joy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pytest
      - name: Joy-check golden fixtures and fleet scan (agents + SKILL.md)
        run: python -m pytest scripts/tests/test_joy_check_instruction_mode.py -v --tb=short

  hook-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # Static checks (dormancy, schema, mirror, allowlist) read the repo
      # directly. Liveness (smoke-test) + register-hook validate read
      # ~/.claude, so deploy hooks + settings.json there first.
      - name: Deploy hooks and settings to ~/.claude
        run: |
          mkdir -p "$HOME/.claude/hooks/lib"
          cp hooks/*.py "$HOME/.claude/hooks/"
          cp hooks/lib/*.py "$HOME/.claude/hooks/lib/" 2>/dev/null || true
          cp .claude/settings.json "$HOME/.claude/settings.json"
      - name: Registered hooks resolve to backing files
        run: python scripts/register-hook.py validate
      - name: Hook-health gate (no-dormant, schema, mirror, liveness)
        run: python scripts/validate-hook-health.py --ci
      - name: Smoke-test all registered hooks
        run: python scripts/smoke-test-hooks.py --ci

  trigger-ambiguity:
    # Advisory: audit-trigger-ambiguity.py always exits 0; this job is always green.
    # It prints the ranked undisambiguated-collision list into the CI log each run.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # INDEX.json is generated (untracked); the audit reads it.
      - run: python scripts/generate-skill-index.py && python scripts/generate-agent-index.py
      - run: python scripts/audit-trigger-ambiguity.py

  index-colocation:
    # Advisory: WARN-ONLY frontmatter<->INDEX colocation report. Never blocks merge.
    # continue-on-error makes even a crash non-fatal to the run.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/check-index-colocation.py --base origin/main --head HEAD --json || true

  skill-eval-coverage:
    # Report-only (ADR skill-eval-pr-ablation, Decision 2). Maps skills changed
    # in this PR to their evals and posts a sticky coverage comment. It does NOT
    # run evals -- the runner shells to the `claude` CLI, absent on GitHub
    # runners (ADR hard constraint). continue-on-error + always-exit-0 detector
    # mean it can never become a failing required check. PR-only, skills/** only.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Skip when no skills changed
        id: filter
        env:
          # Context bound to env, referenced as "$BASE"/"$HEAD" in the shell —
          # the recommended injection-safe pattern. Values are 40-hex SHAs.
          BASE: ${{ github.event.pull_request.base.sha }}  # security-review: ignore
          HEAD: ${{ github.sha }}
        run: |
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^skills/.+/SKILL\.md$'; then
            echo "changed=1" >> "$GITHUB_OUTPUT"
          else
            echo "changed=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Build coverage comment
        if: steps.filter.outputs.changed == '1'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}  # security-review: ignore
          HEAD: ${{ github.sha }}
        run: |
          python scripts/detect-skill-changes.py --base "$BASE" --head "$HEAD" --format json > coverage.json || echo '{}' > coverage.json
          python scripts/render-skill-eval-comment.py coverage.json > comment.md
      - name: Post sticky PR comment
        if: steps.filter.outputs.changed == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bound to env, used as "$PR"/"$REPO" in the shell (injection-safe).
          # PR number is an integer; repo is owner/repo.
          PR: ${{ github.event.pull_request.number }}  # security-review: ignore
          REPO: ${{ github.repository }}
        run: |
          MARKER='<!-- skill-eval-coverage -->'
          # Edit the prior bot comment if present (sticky), else create one.
          CID=$(gh api "repos/$REPO/issues/$PR/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -n1) || true
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$CID" -f body="$(cat comment.md)" || true
          else
            gh pr comment "$PR" --body-file comment.md || true
          fi
