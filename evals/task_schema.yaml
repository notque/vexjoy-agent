# Task YAML Schema for Agent Evaluation
# This file defines the structure for evaluation tasks.
# Inspired by Promptfoo's declarative approach.

# Example task definition:
task:
  # Required: Unique identifier
  id: "example-001"

  # Required: Human-readable name
  name: "Example task name"

  # Required: What the task tests
  description: "Detailed description of what this task evaluates"

  # Required: Category for grouping
  # Options: routing, agent-creation, code-review, voice-generation
  category: "routing"

  # Required: Type of evaluation
  # - capability: Tests new/advanced functionality (pass@k matters)
  #   Use when: Testing if the agent CAN do something
  #   Success metric: At least one trial passes (pass@k = true)
  #   Example: "Can the agent create a valid agent spec?"
  #
  # - regression: Ensures existing behavior doesn't break (pass^k matters)
  #   Use when: Testing if the agent ALWAYS does something correctly
  #   Success metric: All trials pass (pass^k = true)
  #   Example: "Does routing always avoid spawning heavy agents for trivial lookups?"
  type: "capability"

  # What to give the agent
  input:
    # Required: The prompt to send to the agent
    prompt: "The user request that initiates the task"

    # Optional: Files to include in context
    context_files: []

    # Optional: Working directory setup
    setup_commands: []

  # How to run the task
  execution:
    # Required: Which agent to invoke
    agent: "golang-general-engineer"

    # Optional: Specific skill to use
    skill: null

    # Optional: Maximum time in seconds (default: 300)
    timeout_seconds: 300

    # Optional: Number of trials for pass@k (default: 1)
    trials: 1

  # How to grade the output
  graders:
    # Each grader has a type, config, and weight
    - type: "file_exists"
      config:
        path: "expected/output/file.md"
      weight: 0.3

    - type: "string_contains"
      config:
        target: "transcript"  # transcript | file:<path>
        patterns:
          - "expected substring"
      weight: 0.2

    - type: "llm_rubric"
      config:
        rubric: "rubrics/quality.md"
        assertions:
          - "Output meets quality standard X"
          - "Output handles edge case Y"
      weight: 0.5

  # What metrics to track
  metrics:
    - turns      # Number of conversation turns
    - tokens     # Total tokens used
    - latency    # Wall-clock time

  # Reference information for complex tasks
  reference:
    # Optional: Path to reference solution file (relative to task directory)
    # Example: "task-001-ref.md" stored next to task-001.yaml
    #
    # Reference solutions are recommended for:
    # - Complex skills (agent-creation, voice-generation, code-review)
    # - Tasks with subjective quality criteria
    # - Tasks requiring LLM-as-judge grading
    # - Tasks where human reviewers need calibration examples
    #
    # Reference solution files should include:
    # 1. Task summary and context
    # 2. One or more reference outputs showing correct format
    # 3. Explanation of why each example passes
    # 4. Examples of unacceptable outputs with explanations
    # 5. Notes on acceptable variations
    # 6. Grading rubric alignment (how examples map to grader assertions)
    solution_file: null

    # Optional: Notes about acceptable variations
    notes: "Any notes about what constitutes a passing solution"

---
# Grader Types Reference:
#
# 1. file_exists - Check if a file was created
#    config:
#      path: "path/to/expected/file"
#
# 2. string_contains - Check for substrings
#    config:
#      target: "transcript" | "file:path/to/file"
#      patterns: ["substring1", "substring2"]
#      match_all: true  # default: true (all patterns must match)
#
# 3. string_equals - Exact string match
#    config:
#      target: "transcript" | "file:path/to/file"
#      expected: "exact expected string"
#
# 4. regex_match - Regular expression matching
#    config:
#      target: "transcript" | "file:path/to/file"
#      pattern: "regex pattern"
#
# 5. tests_pass - Run test command
#    config:
#      command: "pytest tests/"
#      working_dir: "."
#
# 6. llm_rubric - LLM-as-judge evaluation
#    config:
#      rubric: "path/to/rubric.md"
#      assertions: ["criterion 1", "criterion 2"]
#      model: "sonnet"  # default
