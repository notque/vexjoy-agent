# Calibration examples for string_contains grader
# Each example has an input (transcript + config) and expected grade

examples:
  - id: "sc-001"
    description: "All patterns present - should pass with score 1.0"
    input:
      transcript: |
        The agent successfully created a new file called main.py.
        It contains a function called process_data that handles JSON parsing.
        All tests pass with 100% coverage.
      config:
        target: transcript
        patterns:
          - "main.py"
          - "process_data"
          - "tests pass"
        match_all: true
    expected:
      passed: true
      score: 1.0

  - id: "sc-002"
    description: "Partial match - should fail with partial score"
    input:
      transcript: |
        Created the file utils.py with helper functions.
        The build completed successfully.
      config:
        target: transcript
        patterns:
          - "utils.py"
          - "helper functions"
          - "tests pass"
          - "coverage report"
        match_all: true
    expected:
      passed: false
      score: 0.5  # 2/4 patterns matched

  - id: "sc-003"
    description: "No matches - should fail with score 0.0"
    input:
      transcript: |
        An error occurred during execution.
        The task failed immediately.
      config:
        target: transcript
        patterns:
          - "success"
          - "passed"
          - "file created"
        match_all: true
    expected:
      passed: false
      score: 0.0

  - id: "sc-004"
    description: "match_all=false with one match - should pass"
    input:
      transcript: |
        The agent routed the request to golang-general-engineer.
        Processing took 5 seconds.
      config:
        target: transcript
        patterns:
          - "python-general-engineer"
          - "golang-general-engineer"
          - "typescript-frontend-engineer"
        match_all: false
    expected:
      passed: true
      score: 1.0

  - id: "sc-005"
    description: "match_all=false with no matches - should fail"
    input:
      transcript: |
        Request processed by default handler.
        No specialized agent was invoked.
      config:
        target: transcript
        patterns:
          - "golang-general-engineer"
          - "python-general-engineer"
        match_all: false
    expected:
      passed: false
      score: 0.0
