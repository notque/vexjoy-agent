  - id: "llm-003"
    description: "Clear failure - wrong implementation"
    input:
      transcript: |
        I'll write a factorial function for you:

        ```python
        def factorial(n: int) -> int:
            """Calculate factorial of n."""
            if n <= 1:
                return 1
            return n * factorial(n - 1)
        ```

        This calculates the factorial of a number.
      config:
        assertions:
          - "Implements a fibonacci function (not factorial)"
          - "Returns correct fibonacci values for n=0,1,2,3"
    expected:
      passed: false
      score_min: 0.0
      score_max: 0.2

  - id: "llm-004"
    description: "Code quality assessment - good practices"
    input:
      transcript: |
        I've refactored the user service:

        ```python
        from dataclasses import dataclass
        from typing import Optional
        import logging

        logger = logging.getLogger(__name__)

        @dataclass
        class User:
            id: int
            name: str
            email: str
            active: bool = True

        class UserService:
            def __init__(self, repository: UserRepository) -> None:
                self._repo = repository

            def get_user(self, user_id: int) -> Optional[User]:
                """Retrieve a user by ID."""
                try:
                    return self._repo.find_by_id(user_id)
                except DatabaseError as e:
                    logger.error(f"Failed to fetch user {user_id}: {e}")
                    raise
        ```

        Changes made:
        - Added proper type hints throughout
        - Used dataclass for the User model
        - Implemented dependency injection for the repository
        - Added error logging
      config:
        assertions:
          - "Uses type hints consistently"
          - "Follows dependency injection pattern"
          - "Includes proper error handling with logging"
          - "Uses dataclass for data models"
    expected:
      passed: true
      score_min: 0.85
      score_max: 1.0
