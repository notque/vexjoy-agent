# Calibration examples for llm_rubric grader
# These examples test LLM-as-judge consistency and alignment

examples:
  - id: "llm-001"
    description: "Clear success case - all assertions satisfied"
    input:
      transcript: |
        I'll help you create a Python function to calculate fibonacci numbers.

        ```python
        def fibonacci(n: int) -> int:
            """Calculate the nth fibonacci number.

            Args:
                n: The position in the fibonacci sequence (0-indexed)

            Returns:
                The nth fibonacci number
            """
            if n < 0:
                raise ValueError("n must be non-negative")
            if n <= 1:
                return n
            return fibonacci(n - 1) + fibonacci(n - 2)
        ```

        The function:
        - Has proper type hints (int -> int)
        - Includes a docstring with Args and Returns sections
        - Handles the edge case of negative input
        - Uses recursion for the calculation
      config:
        assertions:
          - "Code includes type hints on the function signature"
          - "Function has a docstring with Args and Returns"
          - "Edge cases are handled (negative numbers)"
    expected:
      passed: true
      score_min: 0.9  # LLM scores can vary, allow range
      score_max: 1.0

