# Model tier tests: same premature-action scenarios with haiku
# Tests whether cheaper/faster models maintain skill discipline.
# Per Anthropic: "Test across model tiers to catch capability cliffs."

tasks:
  - task:
      id: "model-tier-debug-haiku-001"
      name: "Haiku: Debug task loads skill before writing fixes"
      description: |
        Same as premature-action-debug-001 but using haiku model tier.
        Tests whether a cheaper model still loads systematic-debugging
        before taking substantive actions.
      category: "routing"
      type: "capability"
      model: "haiku"

      input:
        prompt: |
          /do The test_user_auth test is failing with a 401 error. The test
          was passing yesterday. Debug this and fix it.
        context_files: []
        setup_commands:
          - "mkdir -p tests"
          - |
            cat > tests/test_user_auth.py << 'PYEOF'
            import pytest

            def test_user_auth():
                """Test user authentication flow."""
                response = authenticate("admin", "password123")
                assert response.status_code == 200, f"Expected 200, got {response.status_code}"
            PYEOF

      execution:
        agent: null
        skill: "do"
        timeout_seconds: 120
        trials: 3
        model: "haiku"

      graders:
        - type: "premature_action"
          config:
            expected_skill: "systematic-debugging"
          weight: 0.7

        - type: "tool_calls"
          config:
            required_tools: ["Skill"]
          weight: 0.3

      metrics:
        - turns
        - tokens
        - latency

      reference:
        solution_file: null
        notes: |
          Haiku variant of premature-action-debug-001.
          Typed as "capability" (not regression) because cheaper models may
          have lower pass rates — we want to measure the gap, not gate on it.

  - task:
      id: "model-tier-review-haiku-002"
      name: "Haiku: Code review loads skill before producing review"
      description: |
        Same as premature-action-review-002 but using haiku model tier.
        Tests whether a cheaper model still loads systematic-code-review
        before producing review output.
      category: "routing"
      type: "capability"
      model: "haiku"

      input:
        prompt: |
          /do Review the authentication module in src/auth.py for security
          issues and code quality.
        context_files: []
        setup_commands:
          - "mkdir -p src"
          - |
            cat > src/auth.py << 'PYEOF'
            import hashlib

            def authenticate(username, password):
                """Authenticate a user."""
                hashed = hashlib.md5(password.encode()).hexdigest()
                # TODO: check against database
                return {"user": username, "token": hashed}

            def create_token(user_id):
                """Create an auth token."""
                return hashlib.sha256(str(user_id).encode()).hexdigest()
            PYEOF

      execution:
        agent: null
        skill: "do"
        timeout_seconds: 120
        trials: 3
        model: "haiku"

      graders:
        - type: "premature_action"
          config:
            expected_skill: "systematic-code-review"
          weight: 0.7

        - type: "tool_calls"
          config:
            required_tools: ["Skill"]
          weight: 0.3

      metrics:
        - turns
        - tokens
        - latency

      reference:
        solution_file: null
        notes: |
          Haiku variant of premature-action-review-002.
          Haiku may be more prone to skipping the skill invocation step
          due to less instruction-following fidelity. This test measures
          that degradation.

  - task:
      id: "model-tier-refactor-haiku-003"
      name: "Haiku: Refactor task loads skill before editing files"
      description: |
        Same as premature-action-refactor-003 but using haiku model tier.
        Tests whether a cheaper model still loads systematic-refactoring
        before editing source files.
      category: "routing"
      type: "capability"
      model: "haiku"

      input:
        prompt: |
          /do Refactor the data processing pipeline in src/pipeline.py —
          it's a 500-line god function that needs to be broken up.
        context_files: []
        setup_commands:
          - "mkdir -p src"
          - |
            cat > src/pipeline.py << 'PYEOF'
            def process_everything(data):
                """A deliberately monolithic function."""
                # Step 1: Validate
                if not data:
                    return None
                # Step 2: Transform
                result = []
                for item in data:
                    transformed = str(item).upper()
                    result.append(transformed)
                # Step 3: Filter
                filtered = [r for r in result if len(r) > 2]
                # Step 4: Aggregate
                return {"count": len(filtered), "items": filtered}
            PYEOF

      execution:
        agent: null
        skill: "do"
        timeout_seconds: 120
        trials: 3
        model: "haiku"

      graders:
        - type: "premature_action"
          config:
            expected_skill: "systematic-refactoring"
          weight: 0.7

        - type: "tool_calls"
          config:
            required_tools: ["Skill"]
          weight: 0.3

      metrics:
        - turns
        - tokens
        - latency

      reference:
        solution_file: null
        notes: |
          Haiku variant of premature-action-refactor-003.
          Comparing pass rates between this and the default model version
          reveals the "skill discipline gap" across model tiers.
          If haiku degrades significantly, the system prompt or hooks
          may need strengthening to compensate.
