# Task 002: Don't over-route trivial lookups
# Tests that /do doesn't spawn expensive agents for simple questions

task:
  id: "routing-002"
  name: "Handle trivial lookup without agent spawn"
  description: |
    Verify that when a user asks a simple question that can be answered
    directly, /do doesn't spawn heavyweight agents unnecessarily.
  category: "routing"
  type: "regression"

  input:
    prompt: "/do what is the current git branch"
    context_files: []
    setup_commands: []

  execution:
    agent: null
    skill: "do"
    timeout_seconds: 30
    trials: 1

  graders:
    - type: "regex_match"
      config:
        target: "transcript"
        pattern: "(feature/|master|main|branch)"
      weight: 0.5

    # Should NOT spawn heavy agents for trivial lookups
    - type: "string_contains"
      config:
        target: "transcript"
        patterns:
          - "Task tool"
          - "spawning agent"
          - "agent-creator-engineer"
        match_all: false
      weight: 0.0  # This is a negative check - we want this to FAIL

  metrics:
    - turns
    - latency

  reference:
    solution_file: null
    notes: |
      This should be handled directly with a simple git command,
      not by spawning research agents or code review agents.
      Response should be quick (<10 seconds ideally).
