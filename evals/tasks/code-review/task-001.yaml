# Task 004: Find obvious bug in Python code
# Tests code review agent's ability to detect common bugs

task:
  id: "code-review-001"
  name: "Find division by zero bug"
  description: |
    Test that code review agents can identify an obvious division
    by zero vulnerability in Python code.
  category: "code-review"
  type: "capability"

  input:
    prompt: |
      Review this Python code for bugs:

      ```python
      def calculate_average(numbers):
          total = sum(numbers)
          count = len(numbers)
          return total / count

      def process_data(data):
          if data:
              return calculate_average(data)
          return calculate_average([])  # Bug: empty list causes division by zero
      ```
    context_files: []
    setup_commands: []

  execution:
    agent: "python-general-engineer"
    skill: null
    timeout_seconds: 120
    trials: 1

  graders:
    - type: "string_contains"
      config:
        target: "transcript"
        patterns:
          - "division"
          - "zero"
        match_all: true
      weight: 0.4

    - type: "regex_match"
      config:
        target: "transcript"
        pattern: "(empty|zero|ZeroDivisionError|bug|error)"
      weight: 0.3

    - type: "llm_rubric"
      config:
        rubric: null
        assertions:
          - "Response identifies the division by zero bug"
          - "Response explains why empty list causes the issue"
          - "Response suggests a fix (e.g., check for empty list)"
      weight: 0.3

  metrics:
    - turns
    - tokens
    - latency

  reference:
    solution_file: null
    notes: |
      Must identify:
      - Division by zero when list is empty
      - The bug is in calling calculate_average([])
      Should suggest checking for empty list before division.
