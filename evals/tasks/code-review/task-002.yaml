# Task 002: Reject code with security vulnerability
# Negative test: Verifies code review does NOT approve insecure code
#
# Per Anthropic: "Test both the cases where a behavior should occur and where it shouldn't.
# One-sided evals create one-sided optimization."

task:
  id: "code-review-002"
  name: "Reject code with security vulnerability"
  description: |
    Test that code review agents correctly identify SQL injection vulnerability
    and do NOT approve the code as safe. The agent should flag the security issue
    and recommend parameterized queries.
  category: "code-review"
  type: "capability"

  input:
    prompt: |
      Review this Python code and tell me if it's safe to use:

      ```python
      def get_user(user_id):
          query = f"SELECT * FROM users WHERE id = {user_id}"
          return db.execute(query)
      ```
    context_files: []
    setup_commands: []

  execution:
    agent: "python-general-engineer"
    skill: null
    timeout_seconds: 120
    trials: 1

  graders:
    # POSITIVE check: Must identify the vulnerability
    - type: "string_contains"
      config:
        target: "transcript"
        patterns:
          - "SQL"
          - "injection"
        match_all: true
      weight: 0.3

    # POSITIVE check: Should mention the fix
    - type: "regex_match"
      config:
        target: "transcript"
        pattern: "(parameterized|placeholder|prepared statement|\\?|%s|:user_id)"
      weight: 0.2

    # NEGATIVE check: Should NOT approve the code as safe
    - type: "llm_rubric"
      config:
        rubric: |
          Code review security assessment rubric:

          The code under review has a clear SQL injection vulnerability.
          An f-string is used to interpolate user_id directly into the query.
          This allows an attacker to inject arbitrary SQL by passing malicious input.

          Example attack: get_user("1; DROP TABLE users;--")

          The ONLY acceptable response is to flag this as a security issue.
        assertions:
          - "Agent explicitly identifies SQL injection as a security vulnerability"
          - "Agent does NOT approve this code as 'safe' or 'looks good'"
          - "Agent does NOT say the code is 'fine' or 'acceptable'"
          - "Agent recommends using parameterized queries or prepared statements"
          - "Agent explains WHY f-string interpolation is dangerous for SQL"
      weight: 0.5

  metrics:
    - turns
    - tokens
    - latency

  reference:
    solution_file: null
    notes: |
      This is a NEGATIVE test for code approval - the agent should NOT approve this code.

      The vulnerability:
      - f-string interpolation of user_id into SQL query
      - No input sanitization or parameterization
      - Classic SQL injection vector

      Expected behavior:
      - Flag SQL injection vulnerability immediately
      - Explain the attack vector
      - Recommend parameterized queries: cursor.execute("SELECT * FROM users WHERE id = ?", (user_id,))
      - Do NOT approve the code

      Failure modes to detect:
      - "This code looks fine"
      - "The code is safe to use"
      - Missing SQL injection identification
      - Suggesting only type validation (insufficient - parameterization required)

      Why this matters:
      - Security vulnerabilities must be caught, not approved
      - False negatives in security review are dangerous
      - Agent should be biased toward caution for security issues
