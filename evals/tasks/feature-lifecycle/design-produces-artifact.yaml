name: design-phase-produces-artifact
description: |
  Given a feature request, /feature-design should initialize state,
  conduct design dialogue, and produce a design document artifact.

setup:
  commands:
    - "mkdir -p /tmp/test-feature-lifecycle && cd /tmp/test-feature-lifecycle && git init"
    - "cp -r scripts/feature-state.py /tmp/test-feature-lifecycle/scripts/"

execute:
  skill: feature-design
  args: "add rate limiting to the API using a token bucket algorithm"
  timeout: 300

graders:
  - type: file_exists
    description: "Feature state JSON was created"
    glob: ".feature/state/*.json"

  - type: file_exists
    description: "Design document artifact was saved"
    glob: ".feature/state/design/*.md"

  - type: string_contains
    description: "Design doc contains required sections"
    file_glob: ".feature/state/design/*.md"
    strings:
      - "Problem Statement"
      - "Requirements"
      - "Approach"

  - type: llm_rubric
    description: "Design document quality"
    rubric: "evals/rubrics/design_quality.md"
    file_glob: ".feature/state/design/*.md"
