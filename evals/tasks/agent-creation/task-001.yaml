# Task 003: Create a simple agent with proper frontmatter
# Tests agent-creator-engineer's ability to produce valid agent specs

task:
  id: "agent-creation-001"
  name: "Create Python formatting agent"
  description: |
    Test that agent-creator-engineer can create a valid agent specification
    with proper YAML frontmatter and appropriate content structure.
  category: "agent-creation"
  type: "capability"

  input:
    prompt: |
      Create a simple agent for Python code formatting.
      It should run ruff format on Python files.
      Save it as agents/python-formatter.md
    context_files: []
    setup_commands: []

  execution:
    agent: "agent-creator-engineer"
    skill: null
    timeout_seconds: 180
    trials: 1

  graders:
    - type: "file_exists"
      config:
        path: "agents/python-formatter.md"
      weight: 0.2

    - type: "yaml_valid"
      config:
        path: "agents/python-formatter.md"
        required_fields:
          - "name"
          - "description"
          - "version"
      weight: 0.3

    - type: "string_contains"
      config:
        target: "file:agents/python-formatter.md"
        patterns:
          - "ruff"
          - "python"
          - "format"
        match_all: true
      weight: 0.2

    - type: "llm_rubric"
      config:
        rubric: "rubrics/agent_quality.md"
        assertions:
          - "Agent has clear, specific triggers defined"
          - "Description explains when to use it"
          - "Agent specifies appropriate tools (Bash at minimum)"
          - "Content includes usage examples"
      weight: 0.3

  metrics:
    - turns
    - tokens
    - latency

  reference:
    solution_file: "task-001-ref.md"
    notes: |
      Valid agent must have:
      - YAML frontmatter with name, description, version
      - Clear triggers for routing
      - Tool list appropriate for formatting tasks
      - Examples of usage
